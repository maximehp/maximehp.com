<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxime Hendryx-Parker</title>
    <meta name="description" content="Portfolio site for Maxime Hendryx-Parker: projects, background, resume, and contact details.">
    <link rel="stylesheet" href="/styles/site.css">
</head>
<body data-page="home">
    <div class="ambient-layer" aria-hidden="true"></div>
    <header class="site-header">
        <div class="header-core">
            <nav class="site-nav" aria-label="Primary">
                <span class="nav-indicator" aria-hidden="true"></span>
                <a class="nav-link" data-nav="home" href="/">Home</a>
                <a class="nav-link" data-nav="projects" href="/projects/">Projects</a>
                <a class="nav-link" data-nav="about" href="/about/">About</a>
            </nav>
        </div>
    </header>

    <div id="page-root">
        <main class="page-shell">
            <section class="hero reveal is-visible">
                <div class="hero-copy">
                    <div class="hero-copy__content">
                        <h1 class="hero-title" id="hero-name"></h1>
                        <p class="hero-subtitle" id="hero-title"></p>
                        <p class="hero-summary" id="hero-summary"></p>
                        <div class="hero-actions">
                            <a class="button-primary" href="/projects/">See Projects</a>
                            <a class="button-ghost" href="/about/">About Me</a>
                        </div>
                    </div>
                </div>
            </section>

            <section class="section-block section-block--lifted" data-scroll-lift>
                <div class="section-heading section-heading--single">
                    <h2>Featured work</h2>
                </div>
                <div class="carousel-shell">
                    <button class="carousel-arrow" type="button" data-carousel-prev aria-label="Previous featured project">
                        <span aria-hidden="true">&larr;</span>
                    </button>
                    <div class="carousel-window" tabindex="0" aria-label="Featured projects carousel">
                        <div class="carousel-track" id="project-carousel-track"></div>
                    </div>
                    <button class="carousel-arrow" type="button" data-carousel-next aria-label="Next featured project">
                        <span aria-hidden="true">&rarr;</span>
                    </button>
                </div>
            </section>

            <section class="section-block is-visible">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">Connect</p>
                        <h2>Accounts, contact, and resume</h2>
                    </div>
                    <p class="section-copy">This section doubles as the quick-access link bar for profiles, direct contact, and the resume viewer.</p>
                </div>
                <div class="split-grid">
                    <div class="glass-panel link-panel">
                        <h3>Reach out</h3>
                        <ul class="contact-list">
                            <li><span>Email</span> <a data-email-link href="#">Loading...</a></li>
                            <li><span>Availability</span> <span id="home-availability"></span></li>
                            <li><span>Resume</span> <a data-resume-link href="/resume/">View Resume</a></li>
                        </ul>
                    </div>
                    <div class="glass-panel link-panel">
                        <h3>Account gallery</h3>
                        <div class="social-grid" id="home-socials"></div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <p>&copy; <span data-current-year></span> <span data-footer-name></span></p>
        </footer>
    </div>

    <script type="module" src="/scripts/app.js"></script>
</body>
</html>
